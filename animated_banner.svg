<svg width="480" height="80" viewBox="0 0 480 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
          <style>
          .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
          .symbol { fill: #f0f6fc; font-size: 13px; font-weight: 600; }
          .name { fill: #8b949e; font-size: 9px; font-weight: 500; letter-spacing: 0.5px; }
          .price { fill: #f0f6fc; font-size: 18px; font-weight: 600; }
          .change { font-size: 11px; font-weight: 600; }

          @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
          }

          @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
          }

          @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
          }

          .banner-bg {
            animation: fadeIn 0.8s ease-out;
          }

          .stock-group {
            animation: slideIn 0.6s ease-out;
            animation-fill-mode: both;
          }

          .change-indicator {
            animation: pulse 2s ease-in-out infinite;
            animation-delay: 1s;
            transform-box: fill-box;
            transform-origin: center;
          }

          .stock-group:nth-child(1) { animation-delay: 0.1s; }
          .stock-group:nth-child(2) { animation-delay: 0.2s; }
          .stock-group:nth-child(3) { animation-delay: 0.3s; }
          .stock-group:nth-child(4) { animation-delay: 0.4s; }
          .stock-group:nth-child(5) { animation-delay: 0.5s; }
          .stock-group:nth-child(6) { animation-delay: 0.6s; }
          .stock-group:nth-child(7) { animation-delay: 0.7s; }
          .stock-group:nth-child(8) { animation-delay: 0.8s; }
        </style>
      </defs>

      <rect width="480" height="80" rx="6" fill="#151515" class="banner-bg"/>

      
      <g transform="translate(0, 0)">
        <g class="stock-group">
          <text x="20" y="26" class="text symbol">RKLB</text>
          <text x="20" y="38" class="text name">ROCKET LAB USA</text>
          <text x="20" y="62" class="text price">$4.25</text>

          <g transform="translate(145, 42)">
            <g class="change-indicator">
              <rect width="75" height="20" rx="10" fill="#39d353" fill-opacity="0.15"/>
              <text x="37.5" y="14" text-anchor="middle" class="text change" fill="#39d353">▲ +3.66%</text>
            </g>
          </g>
        </g>
      </g>
      <g transform="translate(240, 0)">
        <line x1="0" y1="15" x2="0" y2="65" stroke="#30363d" stroke-width="1"/>
        <g class="stock-group">
          <text x="20" y="26" class="text symbol">NVDA</text>
          <text x="20" y="38" class="text name">NVIDIA CORPORATION</text>
          <text x="20" y="62" class="text price">$875.28</text>

          <g transform="translate(145, 42)">
            <g class="change-indicator">
              <rect width="75" height="20" rx="10" fill="#ff7b72" fill-opacity="0.15"/>
              <text x="37.5" y="14" text-anchor="middle" class="text change" fill="#ff7b72">▼ -1.40%</text>
            </g>
          </g>
        </g>
      </g>
    </svg>
